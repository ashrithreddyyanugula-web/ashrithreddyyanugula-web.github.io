<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Tracker - SHREE RAMA TRANSPORT</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        label {
            flex: 1;
        }

        input {
            flex: 2;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        button {
            margin-top: 20px;
            padding: 10px;
            background-color: #2c3e50;
            color: #fff;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        button:hover {
            background-color: #34495e;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        #summary {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Trip Tracker</h1>
        <form id="tripForm">
            <div class="form-row">
                <label for="customerName">Customer Name:</label>
                <input type="text" id="customerName" required>
            </div>
            <div class="form-row">
                <label for="driverName">Driver Name:</label>
                <input type="text" id="driverName" required>
            </div>
            <div class="form-row">
                <label for="tripDate">Date:</label>
                <input type="date" id="tripDate" required>
            </div>
            <div class="form-row">
                <label for="dailyTrips">Number of Trips:</label>
                <input type="number" id="dailyTrips" min="0" required>
            </div>
            <div class="form-row">
                <label for="dieselConsumed">Diesel Consumed (Liters):</label>
                <input type="number" id="dieselConsumed" min="0" step="0.1" required>
            </div>
            <button type="submit" id="submitBtn">Add Trip</button>
        </form>

        <table id="tripTable">
            <thead>
                <tr>
                    <th>Customer Name</th>
                    <th>Driver Name</th>
                    <th>Date</th>
                    <th>Number of Trips</th>
                    <th>Diesel Consumed (Liters)</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tripTableBody">
            </tbody>
        </table>

        <div id="summary"></div>
    </div>

    <script>
        // Password protection
        const password = "transport2026";
        const userPassword = prompt("Enter password to access the trip tracker:");
        if (userPassword !== password) {
            alert("Incorrect password. Access denied.");
            window.location.href = "WEB.html";
        }

        let trips = [];
        let editingIndex = -1;

        document.getElementById('tripForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const customer = document.getElementById('customerName').value;
            const driver = document.getElementById('driverName').value;
            const date = document.getElementById('tripDate').value;
            const tripsCount = parseInt(document.getElementById('dailyTrips').value);
            const dieselConsumed = parseFloat(document.getElementById('dieselConsumed').value);

            if (editingIndex === -1) {
                // Add new
                trips.push({ customer, driver, date, tripsCount, dieselConsumed });
            } else {
                // Update existing
                trips[editingIndex] = { customer, driver, date, tripsCount, dieselConsumed };
                editingIndex = -1;
                document.getElementById('submitBtn').textContent = 'Add Trip';
            }
            updateTable();
            updateSummary();
            document.getElementById('tripForm').reset();
        });

        function updateTable() {
            const tbody = document.getElementById('tripTableBody');
            tbody.innerHTML = '';
            trips.forEach((trip, index) => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = trip.customer;
                row.insertCell(1).textContent = trip.driver;
                row.insertCell(2).textContent = trip.date;
                row.insertCell(3).textContent = trip.tripsCount;
                row.insertCell(4).textContent = trip.dieselConsumed;
                const actionCell = row.insertCell(5);
                const editBtn = document.createElement('button');
                editBtn.textContent = 'Edit';
                editBtn.onclick = () => editTrip(index);
                actionCell.appendChild(editBtn);
                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = 'Delete';
                deleteBtn.onclick = () => deleteTrip(index);
                actionCell.appendChild(deleteBtn);
            });
        }

        function editTrip(index) {
            const trip = trips[index];
            document.getElementById('customerName').value = trip.customer;
            document.getElementById('driverName').value = trip.driver;
            document.getElementById('tripDate').value = trip.date;
            document.getElementById('dailyTrips').value = trip.tripsCount;
            document.getElementById('dieselConsumed').value = trip.dieselConsumed;
            editingIndex = index;
            document.getElementById('submitBtn').textContent = 'Update Trip';
        }

        function updateSummary() {
            const totalTrips = trips.reduce((sum, trip) => sum + trip.tripsCount, 0);
            const totalDiesel = trips.reduce((sum, trip) => sum + trip.dieselConsumed, 0);
            const totalEntries = trips.length;
            const uniqueDrivers = new Set(trips.map(trip => trip.driver)).size;
            const uniqueCustomers = new Set(trips.map(trip => trip.customer)).size;
            document.getElementById('summary').innerHTML = `
                <p>Total Trip Entries: ${totalEntries}</p>
                <p>Total Trips: ${totalTrips}</p>
                <p>Total Diesel Consumed: ${totalDiesel.toFixed(1)} Liters</p>
                <p>Unique Drivers: ${uniqueDrivers}</p>
                <p>Unique Customers: ${uniqueCustomers}</p>
            `;
        }

    </script>
</body>

</html>
