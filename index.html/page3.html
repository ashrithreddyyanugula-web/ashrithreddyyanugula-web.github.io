<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCB Work Tracker - SHREE RAMA TRANSPORT</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
        }
        form {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }
        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        label {
            flex: 1;
        }
        input {
            flex: 2;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        button {
            margin-top: 20px;
            padding: 10px;
            background-color: #2c3e50;
            color: #fff;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        button:hover {
            background-color: #34495e;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        #summary {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>JCB Work Tracker</h1>
        <form id="jcbForm">
            <div class="form-row">
                <label for="customerName">Customer Name:</label>
                <input type="text" id="customerName" required>
            </div>
            <div class="form-row">
                <label for="workDate">Date:</label>
                <input type="date" id="workDate" required>
            </div>
            <div class="form-row">
                <label for="hours">Hours Worked:</label>
                <input type="number" id="hours" min="0" step="0.5" required>
            </div>
            <div class="form-row">
                <label for="dieselConsumed">Diesel Consumed (Liters):</label>
                <input type="number" id="dieselConsumed" min="0" step="0.1" required>
            </div>
            <button type="submit" id="submitBtn">Add Entry</button>
            <button type="button" onclick="clearAll()">Clear All</button>
        </form>

        <table id="jcbTable">
            <thead>
                <tr>
                    <th>Customer Name</th>
                    <th>Date</th>
                    <th>Hours Worked</th>
                    <th>Diesel Consumed (Liters)</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="jcbTableBody">
            </tbody>
        </table>

        <div id="summary"></div>
    </div>

    <script>
        // Password protection
        const password = "jcb2026";
        const userPassword = prompt("Enter password to access the JCB work tracker:");
        if (userPassword !== password) {
            alert("Incorrect password. Access denied.");
            window.location.href = "WEB.html";
        }

        let jcbEntries = [];
        let editingIndex = -1;

        document.getElementById('jcbForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const customer = document.getElementById('customerName').value;
            const date = document.getElementById('workDate').value;
            const hours = parseFloat(document.getElementById('hours').value);
            const diesel = parseFloat(document.getElementById('dieselConsumed').value);

            if (editingIndex === -1) {
                // Add new
                jcbEntries.push({ customer, date, hours, diesel });
            } else {
                // Update existing
                jcbEntries[editingIndex] = { customer, date, hours, diesel };
                editingIndex = -1;
                document.getElementById('submitBtn').textContent = 'Add Entry';
            }
            updateTable();
            updateSummary();
            document.getElementById('jcbForm').reset();
        });

        function updateTable() {
            const tbody = document.getElementById('jcbTableBody');
            tbody.innerHTML = '';
            jcbEntries.forEach((entry, index) => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = entry.customer;
                row.insertCell(1).textContent = entry.date;
                row.insertCell(2).textContent = entry.hours;
                row.insertCell(3).textContent = entry.diesel;
                const actionCell = row.insertCell(4);
                const editBtn = document.createElement('button');
                editBtn.textContent = 'Edit';
                editBtn.onclick = () => editEntry(index);
                actionCell.appendChild(editBtn);
                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = 'Delete';
                deleteBtn.onclick = () => deleteEntry(index);
                actionCell.appendChild(deleteBtn);
            });
        }

        function editEntry(index) {
            const entry = jcbEntries[index];
            document.getElementById('customerName').value = entry.customer;
            document.getElementById('workDate').value = entry.date;
            document.getElementById('hours').value = entry.hours;
            document.getElementById('dieselConsumed').value = entry.diesel;
            editingIndex = index;
            document.getElementById('submitBtn').textContent = 'Update Entry';
        }

        function deleteEntry(index) {
            jcbEntries.splice(index, 1);
            updateTable();
            updateSummary();
        }

        function updateSummary() {
            const totalHours = jcbEntries.reduce((sum, entry) => sum + entry.hours, 0);
            const totalDiesel = jcbEntries.reduce((sum, entry) => sum + entry.diesel, 0);
            const totalEntries = jcbEntries.length;
            const uniqueCustomers = new Set(jcbEntries.map(entry => entry.customer)).size;
            document.getElementById('summary').innerHTML = `
                <p>Total Entries: ${totalEntries}</p>
                <p>Total Hours Worked: ${totalHours.toFixed(1)}</p>
                <p>Total Diesel Consumed: ${totalDiesel.toFixed(1)} Liters</p>
                <p>Unique Customers: ${uniqueCustomers}</p>
            `;
        }

        function clearAll() {
            jcbEntries = [];
            editingIndex = -1;
            document.getElementById('submitBtn').textContent = 'Add Entry';
            updateTable();
            updateSummary();
        }
    </script>
</body>
</html></content>
